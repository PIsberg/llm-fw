name: Semgrep
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
permissions:
  contents: read

jobs:
  semgrep:
    name: Scan
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      # Install the Semgrep CLI from PyPI rather than running inside the
      # semgrep/semgrep container. The container approach forced a `docker pull`
      # from Docker Hub on every run, which intermittently fails with registry
      # timeouts / rate limits ("registry-1.docker.io: context deadline
      # exceeded"). PyPI is the more reliable source and removes the Docker Hub
      # dependency entirely.
      - name: Install Semgrep
        run: pip install --no-cache-dir semgrep
      - name: Run Semgrep
        run: semgrep scan --config=p/default --error --metrics=off
