name: Semgrep
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
jobs:
  semgrep:
    name: Scan
    runs-on: ubuntu-latest
    # Maintained, always-latest Semgrep CLI (replaces the deprecated
    # returntocorp/semgrep-action@v1).
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - run: semgrep scan --config=p/default --error --metrics=off
