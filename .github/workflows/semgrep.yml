name: Semgrep
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
jobs:
  semgrep:
    name: Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Install the Semgrep CLI from PyPI rather than running inside the
      # semgrep/semgrep container. The container approach forced a `docker pull`
      # from Docker Hub on every run, which intermittently fails with registry
      # timeouts / rate limits ("registry-1.docker.io: context deadline
      # exceeded"). PyPI is the more reliable source and removes the Docker Hub
      # dependency entirely.
      - name: Install Semgrep
        run: pip install --no-cache-dir semgrep
      - name: Run Semgrep
        run: semgrep scan --config=p/default --error --metrics=off
