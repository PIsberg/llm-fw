name: Publish to npm

# Publishes the package to npmjs.com. Triggered when a GitHub Release is
# published (cut a release for the version in package.json), or manually via the
# Actions tab. Requires an `NPM_TOKEN` repository secret (npm "Automation" token
# with publish rights). Publishes with provenance, so the package page links back
# to the exact workflow run + commit that built it.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    name: Build, verify & publish
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write # required for npm provenance (--provenance)

    env:
      LLM_FW_MODEL_DIR: ${{ github.workspace }}/.hf-model-cache

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node.js 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Cache embedding model
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ github.workspace }}/.hf-model-cache
          key: llm-fw-model-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Run tests
        run: npm run test:run

      # On a release, the tag must match the version being published, so we never
      # ship a tarball whose version disagrees with the release that triggered it.
      - name: Verify release tag matches package version
        if: github.event_name == 'release'
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "package.json: $PKG_VERSION | tag: $GITHUB_REF_NAME"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Release tag '$GITHUB_REF_NAME' does not match package.json version '$PKG_VERSION'. Bump the version or fix the tag."
            exit 1
          fi

      - name: Publish to npmjs.com
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
