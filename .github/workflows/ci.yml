name: CI

on:
  push:
    branches: [main, feat/**, fix/**, chore/**]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    # Cache the embedding model independently of the per-run LLM_FW_DIR (which
    # the E2E suites point at a throwaway temp dir). EmbeddingChecker honours
    # LLM_FW_MODEL_DIR, so a warm cache here keeps the semantic stage active in
    # tests; a cold miss degrades gracefully rather than failing.
    env:
      LLM_FW_MODEL_DIR: ${{ github.workspace }}/.hf-model-cache

    strategy:
      matrix:
        node-version: [22, 24]

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Cache embedding model
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ github.workspace }}/.hf-model-cache
          key: llm-fw-model-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Run tests
        run: npm run test:run

      - name: Run tests with coverage
        if: matrix.node-version == 22
        run: npm run test:coverage

      - name: Upload coverage
        if: matrix.node-version == 22
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  e2e:
    name: E2E Tests (Node 22)
    runs-on: ubuntu-latest
    needs: build-and-test

    env:
      LLM_FW_MODEL_DIR: ${{ github.workspace }}/.hf-model-cache

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Cache embedding model
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ github.workspace }}/.hf-model-cache
          key: llm-fw-model-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Run E2E tests
        run: npm run test:e2e

  load-test:
    name: Load Tests — Performance & Accuracy (Node 22)
    runs-on: ubuntu-latest
    needs: build-and-test

    env:
      LLM_FW_MODEL_DIR: ${{ github.workspace }}/.hf-model-cache

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache embedding model
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ github.workspace }}/.hf-model-cache
          key: llm-fw-model-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Scenario A — Performance (benign-only stress, small CI values)
        run: npm run test:load:perf
        env:
          LOAD_VUS: '3'
          LOAD_DURATION_S: '15'
          LOAD_P99_MS: '8000'

      - name: Scenario B — Accuracy (mixed traffic, small CI values)
        run: npm run test:load:accuracy
        env:
          LOAD_VUS: '3'
          LOAD_ITERATIONS: '20'
          LOAD_FPR_MAX: '2.0'
          LOAD_TPR_MIN: '60.0'

      # Deterministic sweep: every corpus entry exactly once → exact per-class
      # recall. Publishes the scorecard table to the job summary and fails the
      # job on FPR/TPR floor violations (same gate as the script's exit code).
      - name: Scenario C — Detection scorecard (deterministic sweep)
        run: npm run scorecard
        env:
          LOAD_VUS: '3'
          LOAD_FPR_MAX: '2.0'
          LOAD_TPR_MIN: '70.0'

      - name: Upload scorecard
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: detection-scorecard
          path: |
            docs/SCORECARD.md
            docs/load-results/scorecard-accuracy.json
          if-no-files-found: ignore
